services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dnevnik
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  migrations:
    image: migrate/migrate:v4.17.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://postgres:postgres@db:5432/dnevnik?sslmode=disable"
      - "up"
    restart: on-failure

  bot:
    build: .
    depends_on:
      migrations:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgres://postgres:postgres@db:5432/dnevnik?sslmode=disable
      HTTP_PROXY: http://host.docker.internal:12334
      HTTPS_PROXY: http://host.docker.internal:12334
      ALL_PROXY: socks5://host.docker.internal:12334
      http_proxy: http://host.docker.internal:12334
      https_proxy: http://host.docker.internal:12334
      all_proxy: socks5://host.docker.internal:12334
    restart: unless-stopped

volumes:
  pgdata:
